<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Tracker — LoanFlow</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .tracker-container { max-width: 820px; margin: 0 auto; padding: 2rem; }

    .app-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      border-left: 5px solid var(--grey-300);
      transition: var(--transition);
      cursor: pointer;
    }
    .app-card:hover { box-shadow: var(--shadow-md); }
    .app-card.status-submitted    { border-left-color: var(--teal); }
    .app-card.status-under_review { border-left-color: var(--gold); }
    .app-card.status-approved     { border-left-color: #27ae60; }
    .app-card.status-rejected     { border-left-color: var(--red); }

    .app-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .app-card-id { font-size: 0.8rem; color: var(--grey-500); margin-bottom: 0.25rem; }
    .app-card-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--teal-dark); }
    .app-card-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .app-card-meta span { font-size: 0.82rem; color: var(--grey-500); }
    .app-card-meta strong { color: var(--text); }

    .detail-panel {
      background: var(--grey-100);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      margin-top: 1rem;
      display: none;
    }
    .detail-panel.open { display: block; }

    .history-item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--grey-300);
    }
    .history-item:last-child { border-bottom: none; }
    .history-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--grey-300);
      margin-top: 4px;
      flex-shrink: 0;
    }

    /* Quick search */
    .search-box {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .search-row { display: flex; gap: 1rem; }
    .search-row input { flex: 1; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">Loan<span>Flow</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="apply.html">Apply</a>
    <a href="tracker.html" class="active">Track</a>
    <a href="admin.html">Admin</a>
    <span id="nav-user" style="color:var(--grey-300);font-size:0.9rem;padding:0.5rem 1rem"></span>
    <button class="nav-btn btn" onclick="Auth.logout()" id="logout-btn" style="display:none">Logout</button>
    <a href="login.html" class="nav-btn btn" id="login-btn">Login</a>
  </div>
</nav>

<div class="page-header">
  <h1>📊 Application Tracker</h1>
  <p>Apni loan applications ka real-time status yahan dekhein</p>
</div>

<div class="tracker-container">

  <!-- Guest: Search by ID -->
  <div class="search-box" id="guest-search">
    <h3 style="font-family:'Playfair Display',serif;color:var(--teal-dark);margin-bottom:0.75rem">🔍 Application ID se Track Karein</h3>
    <div class="search-row">
      <input type="text" id="search-id" placeholder="Application ID dalein (jaise: APP1234567890)" />
      <button class="btn btn-teal" onclick="searchById()">Track</button>
    </div>
    <div id="search-result" style="margin-top:1rem"></div>
  </div>

  <!-- Logged in: My Applications -->
  <div id="my-apps-section" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <div>
        <h2 class="section-title">Meri Applications</h2>
        <p class="section-subtitle" style="margin:0" id="apps-count"></p>
      </div>
      <a href="apply.html" class="btn btn-primary btn-sm">+ Nayi Application</a>
    </div>
    <div id="my-apps-list"></div>
  </div>

</div>

<footer>
  <p>LoanFlow &mdash; BIT-155 | MMMUT Gorakhpur | Hariom Prajapati | 2025071131</p>
</footer>

<script src="auth.js"></script>
<script src="app.js"></script>
<script>

  function renderAppCard(app, container) {
    const lt = App.getLoanType(app.loanType);
    const st = App.statusLabel(app.status);

    const card = document.createElement('div');
    card.className = `app-card status-${app.status}`;
    card.innerHTML = `
      <div class="app-card-header">
        <div>
          <div class="app-card-id">ID: ${app.id}</div>
          <div class="app-card-title">${lt ? lt.icon + ' ' + lt.name : app.loanType}</div>
        </div>
        <span class="badge ${st.class}">${st.label}</span>
      </div>
      <div class="app-card-meta">
        <span>💰 <strong>${App.formatCurrency(app.loanAmount)}</strong></span>
        <span>📅 Tenure: <strong>${app.tenure} months</strong></span>
        <span>💳 EMI: <strong>${App.formatCurrency(app.emi)}</strong></span>
        <span>📆 Applied: <strong>${App.formatDate(app.submittedAt)}</strong></span>
        <span>🎯 Eligibility: <strong style="color:${app.eligibilityScore >= 65 ? '#1a7a3c' : app.eligibilityScore >= 45 ? '#a06800' : 'var(--red)'}">${app.eligibilityScore || 0}/100</strong></span>
      </div>

      ${renderSteps(app.status)}

      <div style="font-size:0.82rem;color:var(--teal);margin-top:0.75rem;cursor:pointer" onclick="toggleDetail(this)">
        ▼ Poori details dekhein
      </div>
      <div class="detail-panel">
        <div class="grid-2" style="gap:0.75rem;margin-bottom:1rem">
          <div><label>Applicant</label><p>${app.applicantName}</p></div>
          <div><label>Email</label><p>${app.email}</p></div>
          <div><label>Phone</label><p>${app.phone}</p></div>
          <div><label>Age</label><p>${app.age} years</p></div>
          <div><label>Monthly Income</label><p>${App.formatCurrency(app.income)}</p></div>
          <div><label>CIBIL Score</label><p>${app.cibil}</p></div>
          <div><label>Employment</label><p>${app.employment}</p></div>
          <div><label>Interest Rate</label><p>${app.interestRate}% p.a.</p></div>
        </div>
        ${app.docs && app.docs.length ? `
          <label>Documents Uploaded</label>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.35rem">
            ${app.docs.map(d => `<span class="badge badge-teal">📄 ${d}</span>`).join('')}
          </div>
        ` : ''}
        <div style="margin-top:1.25rem">
          <label>Application History</label>
          ${app.history.map(h => `
            <div class="history-item">
              <div class="history-dot" style="background:${h.status === 'approved' ? '#27ae60' : h.status === 'rejected' ? 'var(--red)' : 'var(--teal)'}"></div>
              <div>
                <div style="font-size:0.82rem;font-weight:600">${App.statusLabel(h.status).label}</div>
                <div style="font-size:0.78rem;color:var(--grey-500)">${App.formatDate(h.date)} — ${h.note}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    container.appendChild(card);
  }

  function renderSteps(status) {
    const statusOrder = ['submitted', 'under_review', 'approved'];
    const stepNames = ['Submitted', 'Under Review', 'Approved'];
    const isRejected = status === 'rejected';

    const getClass = (i) => {
      if (isRejected && i === 2) return 'rejected';
      const si = statusOrder.indexOf(status);
      if (i < si) return 'done';
      if (i === si) return 'active';
      return '';
    };

    return `
      <div class="steps" style="margin:1rem 0">
        ${stepNames.map((name, i) => {
          const cls = getClass(i);
          const icon = cls === 'done' ? '✓' : (isRejected && i === 2) ? '✗' : (i + 1);
          const lbl  = (isRejected && i === 2) ? 'Rejected' : name;
          return `<div class="step ${cls}"><div class="step-dot">${icon}</div><div class="step-label">${lbl}</div></div>`;
        }).join('')}
      </div>
    `;
  }

  function toggleDetail(btn) {
    const panel = btn.nextElementSibling;
    const isOpen = panel.classList.toggle('open');
    btn.textContent = isOpen ? '▲ Details chhupaayein' : '▼ Poori details dekhein';
  }

  function searchById() {
    const id = document.getElementById('search-id').value.trim();
    const result = document.getElementById('search-result');
    result.innerHTML = '';
    if (!id) { result.innerHTML = '<div class="alert alert-warning">Application ID dalein!</div>'; return; }
    const app = App.getApplicationById(id);
    if (!app) {
      result.innerHTML = '<div class="alert alert-error">❌ Yeh ID nahi mili. Check karein.</div>';
      return;
    }
    renderAppCard(app, result);
  }

  // Main init
  const session = Auth.getSession();
  if (session) {
    // Show logged-in state
    document.getElementById('nav-user').textContent = '👤 ' + session.name;
    document.getElementById('logout-btn').style.display = '';
    document.getElementById('login-btn').style.display = 'none';

    const mySection = document.getElementById('my-apps-section');
    mySection.style.display = 'block';

    const apps = App.getApplicationsByUser(session.id).sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
    document.getElementById('apps-count').textContent = apps.length + ' application' + (apps.length !== 1 ? 's' : '') + ' mili';

    const list = document.getElementById('my-apps-list');
    if (!apps.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <h3>Abhi tak koi application nahi</h3>
          <p>Nayi loan application ke liye apply karein.</p>
          <a href="apply.html" class="btn btn-primary" style="margin-top:1rem">Apply Karein</a>
        </div>
      `;
    } else {
      apps.forEach(app => renderAppCard(app, list));
    }
  } else {
    document.getElementById('login-btn').style.display = '';
  }

  // Enter key for search
  document.getElementById('search-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchById();
  });
</script>
</body>
</html>
